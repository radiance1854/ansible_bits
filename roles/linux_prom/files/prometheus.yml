global:
  scrape_interval: 15s #
  evaluation_interval: 15s 

scrape_configs:
  - job_name: snmp-if-mib
    scrape_interval: 180s
    scrape_timeout: 60s
    metrics_path: /snmp
    params:
      module: [if_mib]
    file_sd_configs:
      - files: 
        - '/etc/prometheus/prom.json'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter.domain.com:9116